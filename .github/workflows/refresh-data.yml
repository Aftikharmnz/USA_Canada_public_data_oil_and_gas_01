name: Refresh EIA data and deploy

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Validate the query plan without calling EIA, writing data, or deploying
        required: true
        default: false
        type: boolean
      period_start:
        description: Optional EIA period start applied to every active series
        required: false
        type: string
      period_end:
        description: Optional EIA period end applied to every active series
        required: false
        type: string
      publish_unchanged:
        description: Force a new generation and deployment when canonical values are unchanged
        required: true
        default: false
        type: boolean
  # GitHub schedules are best-effort. These non-round Eastern-time polls provide
  # several attempts after the normal Wednesday WPSR release plus a weekday
  # safety poll for delayed weekly data and monthly-production revisions.
  schedule:
    - cron: "17 11 * * 3"
      timezone: America/New_York
    - cron: "47 12 * * 3"
      timezone: America/New_York
    - cron: "23 15 * * 3"
      timezone: America/New_York
    - cron: "19 11 * * 4"
      timezone: America/New_York
    - cron: "37 13 * * 1-5"
      timezone: America/New_York

permissions:
  contents: write
  pages: write
  id-token: write

# Share the Pages lock with the ordinary push/manual deployment workflow. A
# data refresh commits with GITHUB_TOKEN, so it must deploy its own artifact:
# that push intentionally does not start another workflow run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  refresh-build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      changed: ${{ steps.refresh.outputs.changed }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Validate pipeline contracts
        env:
          PYTHONPATH: pipeline
        run: python -m unittest discover -s tests/pipeline -p "test_*.py" -v

      - name: Refresh verified EIA series
        id: refresh
        shell: bash
        env:
          PYTHONPATH: pipeline
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
          REFRESH_DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run && 'true' || 'false' }}
          PERIOD_START: ${{ inputs.period_start || '' }}
          PERIOD_END: ${{ inputs.period_end || '' }}
          PUBLISH_UNCHANGED: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_unchanged && 'true' || 'false' }}
        run: |
          set -euo pipefail

          refresh_args=(
            refresh-eia
            --store data/cache/eia
            --promote-to public/data/usa
            --retain-generations 2
          )

          if [[ "$REFRESH_DRY_RUN" == "true" ]]; then
            refresh_args+=(--dry-run)
          fi
          if [[ -n "$PERIOD_START" ]]; then
            refresh_args+=(--period-start "$PERIOD_START")
          fi
          if [[ -n "$PERIOD_END" ]]; then
            refresh_args+=(--period-end "$PERIOD_END")
          fi
          if [[ "$PUBLISH_UNCHANGED" == "true" ]]; then
            refresh_args+=(--publish-unchanged)
          fi

          python -m energy_dashboard.cli "${refresh_args[@]}" > "$RUNNER_TEMP/refresh-result.json"
          python -m json.tool "$RUNNER_TEMP/refresh-result.json"

          python - <<'PY'
          import json
          import os
          from pathlib import Path

          result = json.loads(
              (Path(os.environ["RUNNER_TEMP"]) / "refresh-result.json").read_text(
                  encoding="utf-8"
              )
          )
          changed = result.get("changed") is True
          with Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as output:
              output.write(f"changed={'true' if changed else 'false'}\n")
          PY

      - name: Verify promoted public generation and scan generated data
        if: steps.refresh.outputs.changed == 'true'
        env:
          PYTHONPATH: pipeline
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          from energy_dashboard.promotion import verify_public_generation

          public_root = Path("public/data/usa")
          manifest = verify_public_generation(public_root)

          forbidden = (
              b"api_key=",
              b'"api_key"',
              b'"eia_api_key"',
              b"authorization: bearer",
          )
          secret = os.environ.get("EIA_API_KEY", "").encode("utf-8")
          if not secret:
              raise SystemExit("EIA_API_KEY is required for a live refresh")

          for root in (Path("data/cache/eia"), public_root):
              for path in root.rglob("*"):
                  if not path.is_file():
                      continue
                  payload = path.read_bytes()
                  lowered = payload.lower()
                  if secret in payload or any(marker in lowered for marker in forbidden):
                      raise SystemExit(
                          f"Credential-like material found in generated file: {path}"
                      )

          print(
              json.dumps(
                  {
                      "run_id": manifest["run_id"],
                      "series_count": len(manifest["series"]),
                      "asset_count": len(manifest["integrity"]),
                      "secret_scan": "passed",
                  },
                  indent=2,
              )
          )
          PY

      - uses: pnpm/action-setup@v4
        if: steps.refresh.outputs.changed == 'true'
        with:
          version: 11.9.0

      - uses: actions/setup-node@v6
        if: steps.refresh.outputs.changed == 'true'
        with:
          node-version: 24
          cache: pnpm

      - name: Install frontend dependencies
        if: steps.refresh.outputs.changed == 'true'
        run: pnpm install --frozen-lockfile

      - name: Validate frontend
        if: steps.refresh.outputs.changed == 'true'
        run: pnpm run check

      - name: Build repository-scoped Pages artifact
        if: steps.refresh.outputs.changed == 'true'
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
        run: pnpm run build

      - name: Commit refreshed cache and public assets
        if: steps.refresh.outputs.changed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git add -A -- data/cache/eia public/data/usa
          if git diff --cached --quiet; then
            echo "The refresh reported changes but produced no tracked data diff." >&2
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "data: refresh EIA assets"
          # A human push while this run was working must not fail the refresh:
          # replay the data commit on the updated branch head before pushing.
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push

      - uses: actions/configure-pages@v5
        if: steps.refresh.outputs.changed == 'true'

      - uses: actions/upload-pages-artifact@v4
        if: steps.refresh.outputs.changed == 'true'
        with:
          path: dist

  deploy:
    if: needs.refresh-build.outputs.changed == 'true'
    needs: refresh-build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
